server {
    listen ${PORT};
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # SPA routing
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy REST API to Go backend.
    # BACKEND_URL is injected at container startup via envsubst.
    # Docker Compose: http://backend:8080  |  Railway: https://<backend>.up.railway.app
    location /api/ {
        proxy_pass ${BACKEND_URL};
        proxy_http_version 1.1;
        proxy_ssl_server_name on;
        proxy_set_header Host $proxy_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Proxy WebSocket to Go backend
    location /ws/ {
        proxy_pass ${BACKEND_URL};
        proxy_http_version 1.1;
        proxy_ssl_server_name on;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $proxy_host;
        proxy_read_timeout 3600s;
    }

    # Chunked audio streaming — must disable buffering or nginx holds the entire response
    location /listen/ {
        proxy_pass ${BACKEND_URL};
        proxy_http_version 1.1;
        proxy_ssl_server_name on;
        proxy_set_header Host $proxy_host;
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
    }

    # Icecast audio proxy — listeners tune in via /icecast/{mount}
    # ICECAST_URL: Docker Compose = http://icecast:8000 | Railway = http://radioinonestopinfra.railway.internal:8000
    location /icecast/ {
        proxy_pass ${ICECAST_URL}/;
        proxy_http_version 1.0;
        proxy_set_header Host $proxy_host;
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
    }
}
