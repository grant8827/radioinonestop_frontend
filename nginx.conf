server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Use Docker's internal DNS resolver so upstream is resolved at
    # request time rather than nginx startup — prevents crash-loops
    # when the backend container starts after this one.
    resolver 127.0.0.11 valid=30s;

    # SPA routing
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy REST API to Go backend
    location /api/ {
        set $backend http://backend:8080;
        proxy_pass $backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Proxy WebSocket chat to Go backend
    location /ws/ {
        set $backend http://backend:8080;
        proxy_pass $backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 3600s;
    }
}
